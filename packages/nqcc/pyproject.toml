[project]
name = "nqcc"
version = "0.1.0"
description = "Driver and x86 backend for nqcc"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2",
    "nqcc-frontend",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nqcc"]
